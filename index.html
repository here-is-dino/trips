<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trips with Forest — Dino, Joshi & the VW T3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
  <!-- Apple Touch Icon (iOS home screen shortcut) -->
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="" crossorigin="" />
  <link rel="stylesheet" href="css/style.css" />
  <base href="https://travelswithforest.vercel.app/">
</head>
<body>
  <!-- Top bar: All trips + Lang toggle — fixed position, persists across renders -->
  <div class="top-bar">
    <button class="top-bar-btn top-bar-back" id="all-trips-btn" onclick="app.navigate('dashboard');" style="display:none;">
      ← <span id="all-trips-label">All trips</span>
    </button>
    <button class="top-bar-btn lang-toggle" id="lang-toggle" onclick="toggleLang()" title="Switch language">
      <span class="lang-current" id="lang-current">EN</span>
      <span class="lang-sep">/</span>
      <span class="lang-other" id="lang-other">BG</span>
    </button>
  </div>

  <main id="main"></main>
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="" crossorigin=""></script>
  <script src="js/i18n.js"></script>
  <script src="js/trips.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
